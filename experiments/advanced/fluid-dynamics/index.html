<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Dynamics — Physics Lab</title>
    <link rel="stylesheet" href="../../../index.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../../pages/advanced.html" class="back-link">◂ Back to Advanced</a>
            <span class="navbar-brand"><span class="logo-icon">⚛</span> Physics Lab</span>
        </div>
    </nav>

    <div class="container">
        <div class="experiment-layout">
            <div class="experiment-header">
                <h1>🌊 Fluid Dynamics</h1>
                <p>Observe laminar vs turbulent flow, vortex shedding, and Reynolds number thresholds.</p>
            </div>

            <div class="controls-panel glass-panel">
                <div class="section-title">Controls</div>
                <div id="controls-body"></div>
            </div>

            <div class="sim-canvas-wrapper glass-panel">
                <canvas id="sim-canvas"></canvas>
            </div>

            <div class="graph-section glass-panel">
                <div class="section-title">Reynolds Number</div>
                <div style="position:relative; height:260px;">
                    <canvas id="graph-canvas"></canvas>
                </div>
            </div>

            <div class="theory-section glass-panel">
                <div class="section-title">Theory</div>
                <div id="theory-content"></div>
            </div>
        </div>
    </div>

    <!-- Need to load ui.js with correct relative path since we are in experiments/advanced/fluid-dynamics -->
    <script type="module">
        import { initExperimentPage } from '../../../js/ui.js';
        import sim from './sim.js?v=2';
        initExperimentPage({ sim });
    </script>
</body>

</html>
