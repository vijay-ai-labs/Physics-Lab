<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0b1020"/>
  <!-- Field lines -->
  <circle cx="50" cy="50" r="15" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <circle cx="50" cy="50" r="30" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <circle cx="50" cy="50" r="45" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <!-- Wire -->
  <circle cx="50" cy="50" r="6" fill="#cbd5e1"/>
  <circle cx="50" cy="50" r="2" fill="#0b1020"/>
  <!-- Arrow indicating right hand rule -->
  <path d="M 50 20 A 30 30 0 0 1 80 50" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
