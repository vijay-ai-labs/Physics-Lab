<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0b1020"/>
  <!-- Field lines roughly dipole -->
  <path d="M 30 50 Q 50 10 70 50" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M 30 50 Q 50 90 70 50" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <circle cx="30" cy="50" r="12" fill="#ef4444"/>
  <text x="30" y="55" fill="white" font-size="16" font-family="sans-serif" text-anchor="middle">+</text>
  <circle cx="70" cy="50" r="12" fill="#38bdf8"/>
  <text x="70" y="54" fill="white" font-size="16" font-family="sans-serif" text-anchor="middle">-</text>
  <!-- Potential contour -->
  <circle cx="30" cy="50" r="25" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2" fill="none"/>
</svg>
