<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0b1020"/>
  <!-- Atom orbits -->
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#g1)" stroke-width="6" transform="rotate(0,256,256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#g1)" stroke-width="6" transform="rotate(60,256,256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#g1)" stroke-width="6" transform="rotate(120,256,256)"/>
  <!-- Nucleus -->
  <circle cx="256" cy="256" r="28" fill="url(#g2)"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#5ddcff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#5ddcff"/>
    </linearGradient>
  </defs>
</svg>
